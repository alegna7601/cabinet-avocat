<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Cabinet Avocat Petrescu</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    .loading { display: flex; align-items: center; justify-content: center; 
               height: 100vh; flex-direction: column; gap: 1rem;
               background: #1A1A2E; color: #D4AB4E; }
    .loading h2 { font-size: 1.5rem; margin: 0; }
    .loading p { color: #888; font-size: 0.9rem; margin: 0; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333;
               border-top-color: #B8922A; border-radius: 50%;
               animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <h2>⚖ Cabinet Avocat Petrescu</h2>
    <p>Se încarcă panoul de administrare...</p>
  </div>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
