backend:
  name: git-gateway
  branch: main

locale: ro
site_url: https://avangelapetrescu.netlify.app
display_url: https://avangelapetrescu.netlify.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "articole"
    label: "Articole juridice"
    label_singular: "Articol"
    folder: "_articole"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titlu", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "string", default: "01.06.2026"}
      - {label: "Categorie", name: "categorie", widget: "string"}
      - {label: "Rezumat", name: "rezumat", widget: "text"}
      - {label: "Continut", name: "body", widget: "markdown"}

  - name: "anunturi"
    label: "Anunturi"
    label_singular: "Anunt"
    folder: "_anunturi"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titlu", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "string"}
      - {label: "Text", name: "body", widget: "markdown"}
